---
# ansible/playbooks/add_node.yaml
# Description:
#   Add a worker node to the cluster with full bootstrap and validation.
#   Handles: OS validation, firewall, k8s snap install, cluster join,
#   node labeling (build-node, GPU), and architecture verification.
#
# Usage:
#   ansible-playbook -i inventory.yaml add_node.yaml --limit <hostname> -v
#
# The backend prefers 20_join_workers.yaml from the thinkube repo when
# available. This playbook serves as a self-contained alternative.

- name: Prepare worker node
  hosts: k8s_workers
  become: true
  vars:
    k8s_channel: "1.35-classic/stable"
  tasks:
    - name: Check OS version
      ansible.builtin.shell: |
        . /etc/os-release
        echo "$ID $VERSION_ID"
      register: os_check
      changed_when: false

    - name: Validate Ubuntu 24.04
      ansible.builtin.assert:
        that: "'ubuntu 24.04' in os_check.stdout"
        fail_msg: "Node must run Ubuntu 24.04 (got: {{ os_check.stdout }})"

    - name: Detect node architecture
      ansible.builtin.set_fact:
        node_k8s_arch: "{{ 'arm64' if ansible_architecture in ['aarch64', 'arm64'] else 'amd64' }}"

    - name: Display detected architecture
      ansible.builtin.debug:
        msg: "Node architecture: {{ ansible_architecture }} (k8s: {{ node_k8s_arch }})"

    - name: Configure UFW - set default forward policy
      ansible.builtin.lineinfile:
        path: /etc/default/ufw
        regexp: '^DEFAULT_FORWARD_POLICY='
        line: 'DEFAULT_FORWARD_POLICY="ACCEPT"'

    - name: Configure UFW - allow kubelet API
      community.general.ufw:
        rule: allow
        port: "10250"
        proto: tcp

    - name: Configure UFW - allow Cilium health
      community.general.ufw:
        rule: allow
        port: "4240"
        proto: tcp

    - name: Configure UFW - allow Cilium VXLAN
      community.general.ufw:
        rule: allow
        port: "8472"
        proto: udp

    - name: Enable UFW
      community.general.ufw:
        state: enabled

    - name: Install k8s snap
      ansible.builtin.command:
        cmd: "snap install k8s --channel {{ k8s_channel }} --classic"
      register: snap_install
      changed_when: "'already installed' not in snap_install.stderr"
      failed_when: snap_install.rc != 0 and 'already installed' not in snap_install.stderr

    - name: Install podman for native image builds
      ansible.builtin.apt:
        name: podman
        state: present
        update_cache: yes

    - name: Create kubectl wrapper
      ansible.builtin.copy:
        dest: "/home/{{ system_username }}/.local/bin/kubectl"
        content: |
          #!/bin/bash
          exec k8s kubectl "$@"
        mode: "0755"
        owner: "{{ system_username }}"

    - name: Create helm wrapper
      ansible.builtin.copy:
        dest: "/home/{{ system_username }}/.local/bin/helm"
        content: |
          #!/bin/bash
          exec k8s helm "$@"
        mode: "0755"
        owner: "{{ system_username }}"

- name: Join worker to cluster
  hosts: k8s_workers
  become: true
  serial: 1
  vars:
    control_plane_host: "{{ groups['k8s_control_plane'][0] }}"
  tasks:
    - name: Check if already joined
      ansible.builtin.command: k8s status
      register: k8s_status
      changed_when: false
      failed_when: false

    - name: Get join token from control plane
      ansible.builtin.command:
        cmd: "k8s get-join-token {{ inventory_hostname }} --worker"
      register: join_token
      delegate_to: "{{ control_plane_host }}"
      when: k8s_status.rc != 0

    - name: Join the cluster
      ansible.builtin.command:
        cmd: "k8s join-cluster {{ join_token.stdout }}"
      when: k8s_status.rc != 0

    - name: Wait for node to appear in cluster
      ansible.builtin.command:
        cmd: "k8s kubectl get node {{ inventory_hostname }}"
      register: node_check
      delegate_to: "{{ control_plane_host }}"
      until: node_check.rc == 0
      retries: 30
      delay: 10

    - name: Wait for node to be Ready
      ansible.builtin.shell: |
        k8s kubectl get node {{ inventory_hostname }} -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}'
      register: ready_check
      delegate_to: "{{ control_plane_host }}"
      until: "'True' in ready_check.stdout"
      retries: 60
      delay: 10

- name: Label and verify node
  hosts: "{{ groups['k8s_control_plane'][0] }}"
  become: true
  tasks:
    - name: Get target worker hostname
      ansible.builtin.set_fact:
        worker_host: "{{ groups['k8s_workers'] | intersect(ansible_play_hosts_all) | first }}"

    - name: Label node as build node
      ansible.builtin.command: >
        k8s kubectl label node {{ worker_host }}
        thinkube.io/build-node=true --overwrite

    - name: Verify node architecture matches inventory
      ansible.builtin.shell: |
        k8s kubectl get node {{ worker_host }} -o jsonpath='{.metadata.labels.kubernetes\.io/arch}'
      register: k8s_arch
      changed_when: false

    - name: Display architecture verification
      ansible.builtin.debug:
        msg: "Node {{ worker_host }} architecture from k8s: {{ k8s_arch.stdout }}"

    - name: Check for NVIDIA GPU on node
      ansible.builtin.shell: |
        k8s kubectl get node {{ worker_host }} -o jsonpath='{.status.capacity.nvidia\.com/gpu}'
      register: gpu_check
      changed_when: false
      failed_when: false

    - name: Label GPU node
      ansible.builtin.command: >
        k8s kubectl label node {{ worker_host }}
        thinkube.io/gpu=true --overwrite
      when: gpu_check.stdout | default('0') | int > 0

    - name: Get all cluster nodes
      ansible.builtin.command: k8s kubectl get nodes -o wide
      register: cluster_nodes
      changed_when: false

    - name: Display cluster status
      ansible.builtin.debug:
        var: cluster_nodes.stdout_lines
