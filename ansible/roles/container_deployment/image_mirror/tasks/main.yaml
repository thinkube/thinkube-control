# IMPORTANT: This file has a duplicate that must be kept in sync!
# Original: /home/thinkube/thinkube/ansible/roles/container_deployment/image_mirror/tasks/main.yaml
# Copy: /home/thinkube/thinkube/thinkube-control/ansible/roles/container_deployment/image_mirror/tasks/main.yaml
# If you modify this file, ensure the changes are reflected in both locations.

# tasks/main.yaml for image_mirror role
# Description: Mirrors container images from a source registry to a destination registry
# Supports multi-arch: when container_build_platforms has multiple architectures,
# uses podman manifest to create a manifest list preserving all platforms.
#
# Parameters:
#   source_image: Source image to pull from
#   destination_image: Full path to the destination image
#   harbor_api_user: Harbor API username (default: admin)
#   harbor_api_password: Harbor API password
#   container_build_platforms: (optional) e.g. "linux/amd64,linux/arm64"

- name: Display processing
  ansible.builtin.debug:
    msg: "Processing {{ source_image }} → {{ destination_image }}"

- name: Parse destination image
  ansible.builtin.set_fact:
    dest_parts: "{{ destination_image.split('/') }}"
    dest_repo_tag: "{{ destination_image.split('/')[-1] }}"

- name: Extract tag and repository name
  ansible.builtin.set_fact:
    dest_tag: "{{ dest_repo_tag.split(':')[1] if ':' in dest_repo_tag else 'latest' }}"
    repo_name: "{{ dest_repo_tag.split(':')[0] }}"
    harbor_host: "{{ dest_parts[0] }}"
    project_name: "{{ dest_parts[1] }}"

- name: Determine if tag is mutable (latest)
  ansible.builtin.set_fact:
    is_mutable_tag: "{{ dest_tag == 'latest' }}"

- name: Parse build platforms
  ansible.builtin.set_fact:
    build_platforms: "{{ (container_build_platforms | default('linux/' + ansible_architecture_mapped | default('amd64'))).split(',') | map('trim') | list }}"
    is_multi_arch: "{{ (container_build_platforms | default('')).split(',') | map('trim') | select | list | length > 1 }}"

- name: Check if image already exists in Harbor
  ansible.builtin.uri:
    url: "https://{{ harbor_host }}/api/v2.0/projects/{{ project_name }}/repositories/{{ repo_name }}/artifacts/{{ dest_tag }}"
    method: GET
    headers:
      Authorization: "Basic {{ (harbor_api_user + ':' + harbor_api_password) | b64encode }}"
    validate_certs: true
    status_code: [200, 404]
  register: image_check
  no_log: "{{ harbor_api_password is defined }}"

- name: Display status - pinned image exists in Harbor
  ansible.builtin.debug:
    msg: "Image {{ destination_image }} already exists in Harbor. Skipping (pinned tag)."
  when: image_check.status == 200 and not is_mutable_tag

- name: Display status - mutable tag will be refreshed
  ansible.builtin.debug:
    msg: "Image {{ destination_image }} exists but tag is 'latest' — pulling fresh from source."
  when: image_check.status == 200 and is_mutable_tag

# ============================================================
# Single-arch mirroring (original flow)
# ============================================================

- name: "Single-arch: Refresh mutable tag from source"
  block:
    - name: Pull fresh image from source registry
      ansible.builtin.command: >
        podman pull {{ source_image }}
      register: pull_result
      changed_when: pull_result.rc == 0
      failed_when: pull_result.rc != 0

    - name: Tag source image for destination registry
      ansible.builtin.command: >
        podman tag {{ source_image }} {{ destination_image }}
      register: tag_result
      changed_when: tag_result.rc == 0
      failed_when: tag_result.rc != 0

    - name: Push refreshed image to destination registry
      ansible.builtin.command: >
        podman push {{ destination_image }}
        --tls-verify=true
      register: push_result
      changed_when: push_result.rc == 0
      failed_when: push_result.rc != 0
  when: is_mutable_tag and not is_multi_arch

- name: "Single-arch: Process pinned image not in Harbor"
  block:
    - name: Check image in local podman cache
      ansible.builtin.command: podman image exists {{ destination_image }}
      register: local_image_exists
      changed_when: false
      failed_when: false

    - name: Display image exists locally but not in registry
      ansible.builtin.debug:
        msg: "Image exists in local cache but not in Harbor registry. Will push local image."
      when: local_image_exists.rc == 0

    - name: Tag and push local image to Harbor
      block:
        - name: Tag local source image for destination registry
          ansible.builtin.command: >
            podman tag {{ source_image }} {{ destination_image }}
          register: tag_result
          changed_when: tag_result.rc == 0
          failed_when: tag_result.rc != 0

        - name: Push local image to destination registry
          ansible.builtin.command: >
            podman push {{ destination_image }}
            --tls-verify=true
          register: push_result
          changed_when: push_result.rc == 0
          failed_when: push_result.rc != 0
      when: local_image_exists.rc == 0

    - name: Pull from source and push to Harbor
      block:
        - name: Pull source image from original registry
          ansible.builtin.command: >
            podman pull {{ source_image }}
          register: pull_result
          changed_when: pull_result.rc == 0
          failed_when: pull_result.rc != 0

        - name: Tag source image for destination registry
          ansible.builtin.command: >
            podman tag {{ source_image }} {{ destination_image }}
          register: tag_result
          changed_when: tag_result.rc == 0
          failed_when: tag_result.rc != 0

        - name: Push image to destination registry
          ansible.builtin.command: >
            podman push {{ destination_image }}
            --tls-verify=true
          register: push_result
          changed_when: push_result.rc == 0
          failed_when: push_result.rc != 0
      when: local_image_exists.rc != 0
  when: image_check.status != 200 and not is_mutable_tag and not is_multi_arch

# ============================================================
# Multi-arch mirroring: pull per-platform, create manifest list
# ============================================================

- name: "Multi-arch: Mirror image with manifest list"
  block:
    - name: Remove existing manifest if present
      ansible.builtin.command: >
        podman manifest rm {{ destination_image }}
      changed_when: false
      failed_when: false

    - name: Create empty manifest list
      ansible.builtin.command: >
        podman manifest create {{ destination_image }}
      register: manifest_create
      changed_when: manifest_create.rc == 0

    - name: Add each platform to manifest
      ansible.builtin.command: >
        podman manifest add --os linux --arch {{ item | regex_replace('linux/', '') }}
        {{ destination_image }} docker://{{ source_image }}
      loop: "{{ build_platforms }}"
      register: manifest_add
      changed_when: manifest_add.rc == 0
      failed_when: manifest_add.rc != 0

    - name: Push manifest list to destination registry
      ansible.builtin.command: >
        podman manifest push --tls-verify=true --all {{ destination_image }} docker://{{ destination_image }}
      register: manifest_push
      changed_when: manifest_push.rc == 0
      failed_when: manifest_push.rc != 0

    - name: Clean up local manifest
      ansible.builtin.command: >
        podman manifest rm {{ destination_image }}
      changed_when: false
      failed_when: false
  when: >
    is_multi_arch and
    (is_mutable_tag or image_check.status != 200)
