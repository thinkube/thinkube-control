---
# tasks/main.yaml for image_mirror role
# Description: Mirrors container images from a source registry to a destination registry
#   using podman pull/push (with local cache) and crane for multi-arch manifest lists.
#
# Version pinning strategy: source images are pinned to specific versions.
# The role checks if the pinned version tag exists in Harbor to decide whether to skip.
# When source_tag != dest_tag, both tags are pushed so deployments can use the
# dest_tag (e.g. :latest) while the version tag enables skip-on-rerun.
#
# Parameters:
#   source_image: Source image to pull from (should have pinned version tag)
#   destination_image: Full path to the destination image
#   harbor_api_user: Harbor API username for checking artifacts
#   harbor_api_password: Harbor API password for checking artifacts
#   harbor_push_user: Registry push user (e.g. robot$thinkube)
#   harbor_push_password: Registry push password/token
#   required_architectures: List of architectures to ensure (e.g. ['amd64', 'arm64'])

- name: Display processing
  ansible.builtin.debug:
    msg: "Processing {{ source_image }} → {{ destination_image }}"

- name: Parse destination image
  ansible.builtin.set_fact:
    dest_parts: "{{ destination_image.split('/') }}"
    dest_repo_tag: "{{ destination_image.split('/')[-1] }}"

- name: Extract tag and repository name
  ansible.builtin.set_fact:
    dest_tag: "{{ dest_repo_tag.split(':')[1] if ':' in dest_repo_tag else 'latest' }}"
    repo_name: "{{ dest_repo_tag.split(':')[0] }}"
    harbor_host: "{{ dest_parts[0] }}"
    project_name: "{{ dest_parts[1] }}"

- name: Extract source tag for version pinning
  ansible.builtin.set_fact:
    source_tag: "{{ source_image.split(':')[-1] if ':' in source_image else 'latest' }}"
    _dual_tag: "{{ (source_image.split(':')[-1] if ':' in source_image else 'latest') != (dest_repo_tag.split(':')[1] if ':' in dest_repo_tag else 'latest') }}"

- name: Determine version check tag
  ansible.builtin.set_fact:
    _version_tag: "{{ source_tag if _dual_tag else dest_tag }}"

- name: Check if pinned version exists in Harbor
  ansible.builtin.uri:
    url: "https://{{ harbor_host }}/api/v2.0/projects/{{ project_name }}/repositories/{{ repo_name }}/artifacts/{{ _version_tag }}"
    method: GET
    headers:
      Authorization: "Basic {{ (harbor_api_user + ':' + harbor_api_password) | b64encode }}"
    validate_certs: false
    status_code: [200, 404]
  register: image_check
  ignore_errors: true
  no_log: "{{ harbor_api_password is defined }}"

- name: Check existing artifact architectures
  ansible.builtin.set_fact:
    _existing_archs: "{{ (image_check.json.references | default([]) | map(attribute='platform') | map(attribute='architecture') | list) if image_check.status == 200 else [] }}"

- name: Determine missing architectures
  ansible.builtin.set_fact:
    _missing_archs: "{{ required_architectures | default([]) | difference(_existing_archs) }}"

- name: Determine if copy needed
  ansible.builtin.set_fact:
    _needs_copy: "{{ image_check.status != 200 or (_existing_archs | length == 0) or (_missing_archs | length > 0) }}"

- name: Skip image already mirrored with all architectures
  ansible.builtin.debug:
    msg: "Image {{ repo_name }}:{{ _version_tag }} already has architectures {{ _existing_archs }}. Skipping."
  when: not _needs_copy

- name: Pull and push each missing architecture
  when: _needs_copy
  block:
    - name: Login to Harbor with podman
      ansible.builtin.command: >
        podman login {{ harbor_host }}
        --username {{ harbor_push_user }}
        --password {{ harbor_push_password }}
        --tls-verify=false
      changed_when: false
      no_log: true

    - name: Pull and push per architecture
      include_tasks: mirror_arch.yaml
      loop: "{{ _missing_archs if (_missing_archs | length > 0) else required_architectures | default([]) }}"
      loop_control:
        loop_var: _arch

    - name: Create multi-arch manifest list with crane
      when: required_architectures | default([]) | length > 1
      block:
        - name: Login to Harbor with crane
          ansible.builtin.command: >
            crane auth login
            --insecure
            -u {{ harbor_push_user }}
            -p {{ harbor_push_password }}
            {{ harbor_host }}
          changed_when: false
          no_log: true

        - name: Build manifest from per-arch tags
          ansible.builtin.command: >
            crane index append
            --insecure
            --tag {{ destination_image }}
            {% for arch in required_architectures | default([]) %}
            --manifest {{ destination_image }}-{{ arch }}
            {% endfor %}
          register: manifest_result
          changed_when: manifest_result.rc == 0
          failed_when: false

        - name: Warn if manifest creation failed
          ansible.builtin.debug:
            msg: "WARNING: crane index append failed for {{ destination_image }} — image may be single-arch. Add 'architectures' field to metadata. Error: {{ manifest_result.stderr }}"
          when: manifest_result.rc != 0

    - name: Add version tag alias when using dual tags
      when: _dual_tag | bool
      block:
        - name: Login to Harbor with crane (for tagging)
          ansible.builtin.command: >
            crane auth login
            --insecure
            -u {{ harbor_push_user }}
            -p {{ harbor_push_password }}
            {{ harbor_host }}
          changed_when: false
          no_log: true
          when: required_architectures | default([]) | length <= 1

        - name: Tag destination as version tag
          ansible.builtin.command: >
            crane tag --insecure
            {{ destination_image }}
            {{ source_tag }}
          register: tag_result
          changed_when: tag_result.rc == 0
          failed_when: false

        - name: Warn if version tagging failed
          ansible.builtin.debug:
            msg: "WARNING: crane tag failed for {{ destination_image }} → {{ source_tag }}: {{ tag_result.stderr | default('') }}"
          when: tag_result.rc | default(0) != 0
