---
# tasks/main.yaml for image_mirror role
# Description: Mirrors container images from a source registry to a destination registry
#   using skopeo copy --all to preserve multi-arch manifest lists.
# Parameters:
#   source_image: Source image to pull from
#   destination_image: Full path to the destination image
#   harbor_api_user: Harbor API username for checking artifacts (default: admin)
#   harbor_api_password: Harbor API password for checking artifacts
#   harbor_push_user: Registry push user (e.g. robot$thinkube)
#   harbor_push_password: Registry push password/token

- name: Display processing
  ansible.builtin.debug:
    msg: "Processing {{ source_image }} → {{ destination_image }}"

- name: Parse destination image
  ansible.builtin.set_fact:
    dest_parts: "{{ destination_image.split('/') }}"
    dest_repo_tag: "{{ destination_image.split('/')[-1] }}"

- name: Extract tag and repository name
  ansible.builtin.set_fact:
    dest_tag: "{{ dest_repo_tag.split(':')[1] if ':' in dest_repo_tag else 'latest' }}"
    repo_name: "{{ dest_repo_tag.split(':')[0] }}"
    harbor_host: "{{ dest_parts[0] }}"
    project_name: "{{ dest_parts[1] }}"

- name: Determine if tag is mutable (latest)
  ansible.builtin.set_fact:
    is_mutable_tag: "{{ dest_tag == 'latest' }}"

- name: Check if image already exists in Harbor
  ansible.builtin.uri:
    url: "https://{{ harbor_host }}/api/v2.0/projects/{{ project_name }}/repositories/{{ repo_name }}/artifacts/{{ dest_tag }}"
    method: GET
    headers:
      Authorization: "Basic {{ (harbor_api_user + ':' + harbor_api_password) | b64encode }}"
    validate_certs: false
    status_code: [200, 404]
  register: image_check
  ignore_errors: true
  no_log: "{{ harbor_api_password is defined }}"

- name: Check existing artifact architectures
  ansible.builtin.set_fact:
    _existing_archs: "{{ (image_check.json.references | default([]) | map(attribute='platform') | map(attribute='architecture') | list) if image_check.status == 200 else [] }}"

- name: Determine if re-copy needed
  ansible.builtin.set_fact:
    _needs_copy: "{{ image_check.status != 200 or is_mutable_tag or (_existing_archs | length == 0) or (required_architectures | default([]) | difference(_existing_archs) | length > 0) }}"

- name: Skip image already mirrored with all architectures
  ansible.builtin.debug:
    msg: "Image {{ destination_image }} already has architectures {{ _existing_archs }}. Skipping."
  when: not _needs_copy

- name: Ensure skopeo authfile directory exists
  ansible.builtin.file:
    path: "{{ ansible_facts.env.HOME }}/.skopeo"
    state: directory
    mode: '0700'
  when: _needs_copy

- name: Login to destination registry with skopeo
  ansible.builtin.command: >
    skopeo login
    --tls-verify=false
    -u {{ harbor_push_user }}
    -p {{ harbor_push_password }}
    --authfile {{ ansible_facts.env.HOME }}/.skopeo/auth.json
    {{ harbor_host }}
  changed_when: false
  no_log: true
  when: _needs_copy

- name: Copy image with skopeo (multi-arch)
  ansible.builtin.command: >
    skopeo copy --all
    --dest-tls-verify=false
    --authfile {{ ansible_facts.env.HOME }}/.skopeo/auth.json
    docker://{{ source_image }}
    docker://{{ destination_image }}
  register: skopeo_result
  changed_when: skopeo_result.rc == 0
  when: _needs_copy
